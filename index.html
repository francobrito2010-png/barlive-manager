<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0B0B">
<title>B'LIVE Bar OS — Stock · Escáner · Recetario · Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#0D0B0B; --surface:#171314; --surface2:#211B1C; --line:#332A2C; --line-hi:rgba(255,255,255,.22);
  --red:#E5392B; --red-deep:#B02418; --red-soft:rgba(229,57,43,.14);
  --amber:#E8A33D; --amber-soft:rgba(232,163,61,.14);
  --green:#4FAE7F; --green-soft:rgba(79,174,127,.15);
  --text:#FFFFFF; --muted:#9B9298;
  --radius:16px;
  --sans:'Archivo',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.4;overflow-x:hidden}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--text);background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--red)}
textarea{resize:vertical;min-height:90px;line-height:1.5}
::placeholder{color:var(--muted)}

/* ---------- LOGIN ---------- */
#loginScreen{position:fixed;inset:0;background:radial-gradient(120% 55% at 50% 0%,rgba(150,22,10,.42),transparent 60%),var(--bg);z-index:100;display:flex;flex-direction:column;padding:calc(30px + env(safe-area-inset-top)) 22px 30px;overflow-y:auto}
.lang-switch{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.lang-switch button{font-weight:800;font-size:12px;letter-spacing:.04em;padding:8px 14px;border:1px solid var(--line-hi);border-radius:99px;background:rgba(0,0,0,.25);color:var(--muted)}
.lang-switch button.sel{border-color:var(--red);color:#fff;background:var(--red-soft)}
.login-brand{font-weight:900;font-size:26px;letter-spacing:.02em;text-transform:uppercase;text-align:center}
.login-brand span{color:var(--red)}
.login-sub{font-size:10px;font-weight:700;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;text-align:center;margin-top:4px;margin-bottom:26px}
.who{font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:16px}
.users-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:440px;width:100%;margin:0 auto}
.user-tile{position:relative;border:1px solid var(--line-hi);border-radius:18px;background:linear-gradient(160deg,var(--surface2),var(--surface) 70%);padding:22px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;overflow:hidden}
.user-tile:active{filter:brightness(1.18)}
.user-tile.admin-tile{border-color:rgba(232,163,61,.5);background:linear-gradient(160deg,rgba(232,163,61,.12),var(--surface) 70%)}
.avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.user-tile .uname{font-size:15px;font-weight:900;letter-spacing:.03em;text-transform:uppercase;text-align:center;line-height:1.2}
.user-tile .urole{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.user-tile.admin-tile .urole{color:var(--amber)}
.add-tile{border-style:dashed;justify-content:center;min-height:150px;color:var(--muted)}
.add-tile .plus{font-size:34px;font-weight:300;line-height:1}
.add-tile span{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}

/* PIN entry over login */
.pin-panel{max-width:340px;width:100%;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:22px}
.pin-avatar-big{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#fff}
.pin-who{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;text-align:center}
.pin-dots{display:flex;gap:14px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--muted);transition:all .15s}
.pin-dot.full{background:var(--red);border-color:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pin-key{height:64px;border-radius:18px;background:var(--surface);border:1px solid var(--line-hi);font-size:22px;font-weight:800}
.pin-key:active{background:var(--surface2)}
.pin-error{color:var(--red);font-size:13px;min-height:18px;font-weight:600}
.link-btn{font-size:13px;font-weight:700;color:var(--muted);padding:8px;text-decoration:underline}

/* ---------- Frame ---------- */
.app{display:none;flex-direction:column;min-height:100dvh}
.hero{background:radial-gradient(130% 70% at 50% -10%,rgba(160,24,10,.48),transparent 62%);padding:16px 18px 10px}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.back-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line-hi);display:none;align-items:center;justify-content:center;font-size:17px;background:rgba(0,0,0,.25);flex-shrink:0}
.logo{font-weight:900;font-size:20px;letter-spacing:.02em;text-transform:uppercase;flex:1;min-width:0}
.logo .fire{margin-right:5px}
.logo span{color:var(--red)}
.logo small{display:block;font-weight:600;font-size:9px;letter-spacing:.3em;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{display:flex;gap:7px;align-items:center;flex-shrink:0}
.pill{font-weight:800;font-size:12px;padding:8px 13px;border:1px solid var(--line-hi);border-radius:99px;background:rgba(0,0,0,.25)}
.userchip{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 5px;border:1px solid var(--line);border-radius:99px;background:rgba(0,0,0,.28);font-weight:800;font-size:12px;text-transform:uppercase}
.userchip .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff}
.userchip.admin{border-color:rgba(232,163,61,.5)}
.chip{font-family:var(--mono);font-size:10px;padding:7px 10px;border:1px solid var(--line);border-radius:99px;color:var(--muted);background:rgba(0,0,0,.25);text-transform:uppercase}
.chip.on{color:var(--green);border-color:rgba(79,174,127,.4)}
main{flex:1;padding:0 18px calc(40px + env(safe-area-inset-bottom));max-width:600px;width:100%;margin:0 auto}
.screen{display:none}
.screen.active{display:block}

/* ---------- HUB ---------- */
.hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
.tile{position:relative;border:1px solid var(--line-hi);border-radius:20px;background:linear-gradient(160deg,var(--surface2),var(--surface) 65%);padding:22px 16px 18px;min-height:150px;display:flex;flex-direction:column;justify-content:flex-end;gap:8px;overflow:hidden;text-align:left}
.tile:active{filter:brightness(1.15)}
.tile.locked{opacity:.5}
.tile .glow{position:absolute;top:-30%;right:-20%;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(229,57,43,.35),transparent 70%)}
.tile .ico{font-size:30px;line-height:1}
.tile .ico svg{width:38px;height:38px;stroke:var(--red);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
.tile .ico svg .fillw{fill:rgba(255,255,255,.06)}
.tile.admin-only .ico svg{width:26px;height:26px}
.tile h2{font-size:15px;font-weight:900;letter-spacing:.05em;text-transform:uppercase}
.tile p{font-size:11px;color:var(--muted);font-weight:600}
.tile .badge{position:absolute;top:12px;right:12px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--amber);border:1px solid rgba(232,163,61,.5);background:var(--amber-soft);border-radius:99px;padding:4px 9px}
.tile .lock{position:absolute;top:12px;right:12px;font-size:13px;opacity:.6}
.tile.admin-only{grid-column:1/-1;min-height:auto;flex-direction:row;align-items:center;justify-content:flex-start;gap:14px;padding:16px}
.tile.admin-only .ico{font-size:24px}
.tile.admin-only .txt h2{font-size:14px}

/* ---------- Stats / toolbar / stock ---------- */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.stat{border:1px solid var(--line-hi);border-radius:var(--radius);padding:13px 16px;background:rgba(0,0,0,.22)}
.stat .num{font-size:28px;font-weight:900;line-height:1.1}
.stat .lbl{font-size:10px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.stat.warn{border-color:rgba(232,163,61,.5);background:var(--amber-soft)}
.stat.warn .num,.stat.warn .lbl{color:var(--amber)}
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{padding-left:42px;font-family:var(--mono);font-size:14px}
.search-bar .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tbtn{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;padding:11px 14px;border:1px solid var(--line-hi);border-radius:12px;background:var(--surface)}
.tbtn.red{background:linear-gradient(135deg,var(--red),var(--red-deep));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(229,57,43,.3)}
.tbtn.amber{color:var(--amber);border-color:rgba(232,163,61,.5);background:var(--amber-soft)}
.tbtn.on{border-color:var(--red);color:var(--red)}
.tbtn:active{filter:brightness(.9)}
.spacer{flex:1}

.shop-card{border:1px solid rgba(232,163,61,.45);background:linear-gradient(180deg,rgba(232,163,61,.1),rgba(232,163,61,.03));border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.shop-head{display:flex;align-items:center;justify-content:space-between;font-weight:900;letter-spacing:.06em;text-transform:uppercase;font-size:14px;color:var(--amber);cursor:pointer}
.shop-head .cnt{font-family:var(--mono);font-size:13px}
.shop-list{margin-top:10px;display:none}
.shop-card.open .shop-list{display:block}
.shop-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid rgba(232,163,61,.16);font-size:13px}
.shop-item b{font-weight:700;flex:1;min-width:0}
.shop-item span{color:var(--muted);font-family:var(--mono);font-size:11px;flex-shrink:0}
.shop-item .rm{width:28px;height:28px;border-radius:8px;border:1px solid rgba(232,163,61,.4);font-size:13px;flex-shrink:0}
.shop-add{display:flex;gap:8px;margin-top:12px}
.shop-add input{padding:10px 12px;font-size:14px}
.shop-add button{flex-shrink:0;width:46px;border-radius:12px;background:linear-gradient(135deg,var(--red),var(--red-deep));color:#fff;font-size:20px;font-weight:800}

.cat{border:1px solid var(--line-hi);background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.cat-head{display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer}
.cat-head h2{font-size:15px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.cat-head .right{display:flex;align-items:center;gap:10px;color:var(--muted);font-family:var(--mono);font-size:12px}
.cat-head .chev{transition:transform .18s;font-size:11px}
.cat.open .cat-head .chev{transform:rotate(90deg)}
.cat-body{display:none;padding:0 12px 12px}
.cat.open .cat-body{display:block}

.prod{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:8px}
.prod.low{border-color:rgba(232,163,61,.55)}
.prod-top{display:flex;align-items:center;gap:10px}
.prod-name{flex:1;min-width:0;font-weight:800;font-size:15px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.low-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--amber);border:1px solid rgba(232,163,61,.5);background:var(--amber-soft);border-radius:99px;padding:3px 8px;margin-left:8px;vertical-align:2px}
.qty-ctrl{display:flex;align-items:center;gap:12px;flex-shrink:0}
.qty-ctrl .qv{font-weight:900;font-size:22px;min-width:30px;text-align:center}
.prod.low .qv{color:var(--amber)}
.cbtn{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0}
.cbtn.minus{border:1.5px solid var(--line-hi);background:rgba(0,0,0,.3)}
.cbtn.plus{background:linear-gradient(135deg,var(--red),var(--red-deep));color:#fff;box-shadow:0 3px 12px rgba(229,57,43,.35)}
.cbtn:active{filter:brightness(.85)}
.prod-sub{display:flex;align-items:center;gap:8px;margin-top:9px;color:var(--muted);font-size:12px}
.min-btn{font-family:var(--mono);font-size:11px;font-weight:600;padding:6px 11px;border:1px solid var(--line-hi);border-radius:99px;background:rgba(0,0,0,.25);color:var(--text)}
.min-btn.plain{border-color:transparent;background:none;color:var(--muted)}
.prod-sub .code{font-family:var(--mono);font-size:10px;margin-left:auto;opacity:.7;max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:34px 20px}

/* ---------- Scanner ---------- */
.mode-switch{display:grid;grid-template-columns:1fr 1fr;background:var(--surface);border:1px solid var(--line-hi);border-radius:var(--radius);padding:5px;gap:5px;margin:14px 0}
.mode-btn{padding:13px 8px;border-radius:12px;font-weight:900;font-size:14px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;transition:all .15s}
.mode-btn.active-in{background:var(--green-soft);color:var(--green);box-shadow:inset 0 0 0 1px rgba(79,174,127,.45)}
.mode-btn.active-out{background:var(--red-soft);color:var(--red);box-shadow:inset 0 0 0 1px rgba(229,57,43,.5)}
.scan-wrap{position:relative;border-radius:var(--radius);overflow:hidden;background:#080606;border:1px solid var(--line-hi);aspect-ratio:4/3}
#reader{width:100%;height:100%}
#reader video{width:100%!important;height:100%!important;object-fit:cover}
.scan-overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.scan-frame{position:relative;width:74%;height:44%}
.corner{position:absolute;width:26px;height:26px;border-color:var(--red);border-style:solid;border-width:0}
.corner.tl{top:0;left:0;border-top-width:3px;border-left-width:3px;border-top-left-radius:8px}
.corner.tr{top:0;right:0;border-top-width:3px;border-right-width:3px;border-top-right-radius:8px}
.corner.bl{bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:8px}
.corner.br{bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:8px}
.scan-line{position:absolute;left:6%;right:6%;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);animation:sweep 2.2s ease-in-out infinite}
@keyframes sweep{0%,100%{top:8%}50%{top:88%}}
@media (prefers-reduced-motion:reduce){.scan-line{animation:none;top:50%}}
.scan-idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--surface);z-index:2}
.scan-idle p{color:var(--muted);font-size:13px;text-align:center;max-width:270px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 22px;border-radius:14px;font-weight:900;font-size:14px;letter-spacing:.06em;text-transform:uppercase}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red-deep));color:#fff;box-shadow:0 4px 16px rgba(229,57,43,.3)}
.btn-green{background:var(--green);color:#08130D}
.btn-ghost{border:1px solid var(--line-hi);color:var(--text)}
.btn-danger{border:1px solid rgba(229,57,43,.55);color:var(--red);background:var(--red-soft)}
.btn-block{width:100%}
.btn:active{filter:brightness(.88)}
.scan-status{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;margin-top:10px;min-height:18px}
.manual-row{display:flex;gap:8px;margin-top:14px}
.manual-row input{font-family:var(--mono)}
.manual-row .btn{padding:12px 16px;flex-shrink:0}

/* ---------- Historial ---------- */
.mv-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.mv-tag{font-family:var(--mono);font-size:12px;font-weight:600;padding:5px 9px;border-radius:8px;flex-shrink:0}
.mv-tag.in{color:var(--green);background:var(--green-soft)}
.mv-tag.out{color:var(--red);background:var(--red-soft)}
.mv-card .info{flex:1;min-width:0}
.mv-card .name{font-weight:800;font-size:13px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mv-card .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.mv-card .by{display:inline-flex;align-items:center;gap:5px;font-family:var(--sans);font-weight:800;color:#CFC7CC}
.mv-card .by .av{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff}

/* ---------- Recetario ---------- */
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.rec-card{border:1px solid var(--line-hi);border-radius:18px;background:linear-gradient(170deg,#1E1718,#121011 70%);padding:16px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.rec-card:active{filter:brightness(1.15)}
.rec-card svg{width:86px;height:100px}
.rec-card h3{font-size:13px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;line-height:1.25}
.rec-detail-glass{display:flex;justify-content:center;margin:6px 0 14px}
.rec-detail-glass svg{width:150px;height:172px}
/* Detalle de cóctel: texto 30% más grande para lectura cómoda */
#recViewName{font-size:22px}
.rec-sec{font-size:13px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin:20px 0 10px}
.rec-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-size:18px;line-height:1.45}
.rec-item .n{font-family:var(--mono);color:var(--red);font-weight:600;flex-shrink:0;font-size:18px}
.swatches{display:flex;flex-wrap:wrap;gap:9px;margin-top:4px}
.swatch{width:34px;height:34px;border-radius:50%;border:2px solid transparent}
.swatch.sel{border-color:#fff;box-shadow:0 0 0 2px var(--red)}
.copa-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.copa-opt{border:1px solid var(--line);border-radius:12px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--surface2)}
.copa-opt svg{width:34px;height:40px}
.copa-opt span{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.copa-opt.sel{border-color:var(--red);background:var(--red-soft)}

/* ---------- Manual ---------- */
.man-sec{border:1px solid var(--line-hi);background:var(--surface);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.man-head{display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer}
.man-head h2{font-size:14px;font-weight:900;letter-spacing:.07em;text-transform:uppercase}
.man-head .right{display:flex;align-items:center;gap:10px;color:var(--muted);font-family:var(--mono);font-size:12px}
.man-head .chev{transition:transform .18s;font-size:11px}
.man-sec.open .man-head .chev{transform:rotate(90deg)}
.man-body{display:none;padding:0 16px 14px}
.man-sec.open .man-body{display:block}
.man-item{display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:14px;color:#E8E2E3}
.man-item .dot{color:var(--red);flex-shrink:0}
.man-edit{margin-top:10px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);padding:9px 14px;border:1px solid rgba(232,163,61,.5);border-radius:10px;background:var(--amber-soft)}

/* ---------- Empleados (gestión admin) ---------- */
.emp-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line-hi);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.emp-row .info{flex:1;min-width:0}
.emp-row .en{font-weight:800;font-size:15px;text-transform:uppercase}

.fab{position:fixed;right:18px;bottom:calc(24px + env(safe-area-inset-bottom));width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red-deep));color:#fff;font-size:28px;font-weight:800;display:none;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(229,57,43,.45);z-index:49}

.field{margin-bottom:12px}

.modal-actions{display:flex;gap:10px;margin-top:6px}

const $ = id => document.getElementById(id);
function initial(name){ return (name||"?").trim().charAt(0).toUpperCase() || "?"; }
let audioCtx = null;
function beep(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 1250;
    g.gain.setValueAtTime(.14, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+.15);
    o.start(); o.stop(audioCtx.currentTime+.16);
  }catch(e){}
  if(navigator.vibrate) navigator.vibrate(60);
}
let toastTimer = null;
function toast(msg, kind){
  const el = $("toast");
  el.textContent = msg; el.className = "toast show " + (kind||"");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{el.className="toast";}, 2400);
}
function fmtTs(ts){
  const d = ts instanceof Date ? ts : new Date(ts);
  const loc = lang==="pt" ? "pt-PT" : "es-ES";
  return d.toLocaleDateString(loc,{day:"2-digit",month:"2-digit"}) + " " +
         d.toLocaleTimeString(loc,{hour:"2-digit",minute:"2-digit"});
}

function lighten(hex, amt){
  const n = parseInt(hex.slice(1),16);
  const r = Math.min(255, ((n>>16)&255) + amt), g = Math.min(255, ((n>>8)&255) + amt), b = Math.min(255, (n&255) + amt);
  return `rgb(${r},${g},${b})`;
}
let gidCounter = 0;
function glassSVG(copa, color, garnish){
  const s = GLASS_SHAPES[copa] || GLASS_SHAPES.highball;
  const gid = "g" + (++gidCounter);
  const stem = s.stem
    ? `<line x1="50" y1="60" x2="50" y2="102" stroke="rgba(255,255,255,.85)" stroke-width="2.2"/>
       <line x1="35" y1="106" x2="65" y2="106" stroke="rgba(255,255,255,.85)" stroke-width="2.2" stroke-linecap="round"/>`
    : "";
  const garn = garnish ? `<text x="71" y="20" font-size="17" text-anchor="middle">${esc(garnish)}</text>` : "";
  return `<svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${lighten(color,55)}" stop-opacity=".95"/>
      <stop offset="1" stop-color="${color}"/>
    </linearGradient></defs>
    <path d="${s.liquid}" fill="url(#${gid})"/>
    <path d="${s.outline}" stroke="rgba(255,255,255,.85)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    ${stem}${garn}
  </svg>`;
}

function openPin(userId){
  const u = userId==="__admin__" ? ADMIN_USER : employees.get(userId);
  if(!u) return;
  pinTarget = userId==="__admin__" ? ADMIN_USER : { id:userId, ...u, role:"empleado" };
  pinEntered = "";
  $("pinAvatar").style.background = pinTarget.color || "#E5392B";
  $("pinAvatar").textContent = initial(pinTarget.nombre);
  $("pinWho").textContent = pinTarget.nombre;
  $("pinError").textContent = "";
  // Dots según el largo real del PIN de este usuario (4, 5 o 6)
  const len = (pinTarget.pin||"").length || 4;
  $("pinDots").innerHTML = Array.from({length:len}, ()=>'<div class="pin-dot"></div>').join("");
  $("loginSelect").style.display = "none";
  $("loginPin").style.display = "flex";
}

(function buildPinPad(){
  const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
  keys.forEach(k=>{
    const b = document.createElement("button");
    b.className = "pin-key"; b.textContent = k;
    if(k==="") b.style.visibility="hidden";
    b.addEventListener("click",()=>{
      const targetLen = (pinTarget.pin||"").length || 4;
      if(k==="⌫") pinEntered = pinEntered.slice(0,-1);
      else if(pinEntered.length<targetLen) pinEntered += k;
      [...$("pinDots").children].forEach((d,i)=>d.classList.toggle("full", i<pinEntered.length));
      $("pinError").textContent = "";
      if(pinEntered.length===targetLen){
        if(pinEntered===pinTarget.pin){
          currentUser = pinTarget;
          enterApp();
        }else{
          $("pinError").textContent = lang==="pt" ? "PIN incorreto" : "PIN incorrecto";
          pinEntered = "";
          setTimeout(()=>[...$("pinDots").children].forEach(d=>d.classList.remove("full")),250);
        }
      }
    });
    $("pinPad").appendChild(b);
  });
})();

  $("backBtn").style.display = name==="hub" ? "none" : "flex";
  $("statsRow").style.display = (name==="hub"||name==="stock") ? "grid" : "none";
  const fabScreens = isAdmin() ? {stock:1, recipes:1, manual:1, team:1} : {stock:1};
  $("fab").style.display = fabScreens[name] ? "flex" : "none";
  if(name!=="scan") stopScanner();
  window.scrollTo(0,0);
}
document.querySelectorAll(".tile").forEach(tl=>tl.addEventListener("click",()=>{
  const go = tl.dataset.go;
  if(go==="team" && !isAdmin()) return;
  showScreen(go);
}));
$("backBtn").addEventListener("click",()=>showScreen("hub"));
$("fab").addEventListener("click",()=>{
  if(currentScreen==="stock") openRegModal(null,null);
  else if(currentScreen==="recipes") openRecForm(null);
  else if(currentScreen==="manual") openManForm(null);
  else if(currentScreen==="team") openEmpForm(null);
});

/* =================== Firebase / Demo =================== */
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function initData(){
  if(FIREBASE_CONFIG){
    try{
      await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
      await loadScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js");
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      db.collection("gf_empleados").onSnapshot(s=>{s.docChanges().forEach(ch=>{
        if(ch.type==="removed") employees.delete(ch.doc.id); else employees.set(ch.doc.id, ch.doc.data());
      }); renderLogin(); if($("app").style.display==="flex") renderEmployees();});
      db.collection("gf_productos").onSnapshot(s=>{s.docChanges().forEach(ch=>{
        if(ch.type==="removed") products.delete(ch.doc.id); else products.set(ch.doc.id, ch.doc.data());
      }); if($("app").style.display==="flex") renderAll();});
      db.collection("gf_movimientos").orderBy("ts","desc").limit(150).onSnapshot(s=>{
        movements = s.docs.map(d=>{const x=d.data(); return {...x, ts:x.ts&&x.ts.toDate?x.ts.toDate():new Date()};});
        renderHistory();
      });
      db.collection("gf_recetas").onSnapshot(s=>{s.docChanges().forEach(ch=>{
        if(ch.type==="removed") recipes.delete(ch.doc.id); else recipes.set(ch.doc.id, ch.doc.data());
      }); renderRecipes();});
      db.collection("gf_manual").onSnapshot(s=>{s.docChanges().forEach(ch=>{
        if(ch.type==="removed") manual.delete(ch.doc.id); else manual.set(ch.doc.id, ch.doc.data());
      }); renderManual();});
      db.collection("gf_compras").onSnapshot(s=>{s.docChanges().forEach(ch=>{
        if(ch.type==="removed") shopExtra.delete(ch.doc.id); else shopExtra.set(ch.doc.id, ch.doc.data());
      }); renderShopping(); renderStats();});
      const chip = $("syncChip"); chip.textContent="sync"; chip.classList.add("on");

/* =================== Stock =================== */
async function applyDelta(id, delta){
  const p = products.get(id); if(!p) return;
  if(delta<0 && p.cantidad + delta < 0){ toast(`${t("sinStock")} ${p.cantidad}`,"err"); return; }
  p.cantidad += delta;
  products.set(id,p);
  logMovement(id, p, delta>0?"entrada":"salida", Math.abs(delta));
  await persist("gf_productos", id, p);
  renderAll();
}
async function applyMovement(id, prod, qty, tipo){
  let p = products.get(id);
  if(!p){ p = {...prod, cantidad:0, code:id}; products.set(id,p); }
  if(tipo==="salida" && p.cantidad < qty) return {ok:false, available:p.cantidad};
  p.cantidad += (tipo==="entrada" ? qty : -qty);
  products.set(id,p);
  logMovement(id, p, tipo, qty);
  await persist("gf_productos", id, p);
  renderAll();
  return {ok:true};
}

/* =================== Open Food Facts =================== */
function guessCategory(tags){
  const s = (tags||[]).join(" ");
  if(/whisk/i.test(s)) return "WHISKY";
  if(/\bgin\b|gins/i.test(s)) return "GIN";
  if(/vodka/i.test(s)) return "VODKA";
  if(/\brum\b|rhum|rons?\b/i.test(s)) return "RON";
  if(/tequila|mezcal/i.test(s)) return "TEQUILA";
  if(/liqueur|licor/i.test(s)) return "LICORES";
  if(/syrup|sirope|xarope/i.test(s)) return "JARABES";
  if(/cognac|brandy|aguardente/i.test(s)) return "AGUARDENTE / COGNAC";
  if(/wine|vinho|vino|sparkling|champagne|cava|prosecco/i.test(s)) return "VINOS & ESPUMANTES";
  if(/beer|cerveja|cerveza/i.test(s)) return "CERVEZA";
  if(/soda|soft-drink|refresco|juice|water/i.test(s)) return "REFRESCOS";
  return "OTROS";
}
async function lookupOFF(code){
  try{
    const ctrl = new AbortController();
    const to = setTimeout(()=>ctrl.abort(), 6000);
    const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json?fields=product_name,brands,quantity,categories_tags`,{signal:ctrl.signal});
    clearTimeout(to);
    if(!r.ok) return null;
    const j = await r.json();
    if(j.status!==1 || !j.product || !j.product.product_name) return null;
    const p = j.product;
    const nombre = [p.brands, p.product_name, p.quantity].filter(Boolean).join(" ").trim().toUpperCase();
    return {nombre, categoria:guessCategory(p.categories_tags), min:STOCK_MIN_DEFAULT};
  }catch(e){ return null; }
}

/* =================== Escáner =================== */
async function startScanner(){
  if(scanning) return;
  try{
    $("scanIdle").style.display="none";
    $("scanOverlay").style.display="flex";
    scanner = scanner || new Html5Qrcode("reader",{formatsToSupport:[
      Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.QR_CODE
    ]});
    await scanner.start({facingMode:"environment"},
      {fps:10, qrbox:(w,h)=>({width:Math.floor(w*.74), height:Math.floor(h*.44)})},
      onScan, ()=>{});
    scanning = true;
    $("scanStatus").textContent = t("escaneando");
  }catch(e){
    console.error(e);
    $("scanIdle").style.display="flex";
    $("scanOverlay").style.display="none";
    toast(t("camErr"),"err");
  }
}
async function stopScanner(){
  if(scanner && scanning){ try{ await scanner.stop(); }catch(e){} scanning=false; }
  $("scanIdle").style.display="flex";
  $("scanOverlay").style.display="none";
  $("scanStatus").textContent = "";
}
function pauseScan(){ if(scanner && scanning){ try{scanner.pause(true);}catch(e){} } }
function resumeScan(){ if(scanner && scanning){ try{scanner.resume();}catch(e){} $("scanStatus").textContent=t("escaneando"); } }
async function onScan(code){
  const now = Date.now();
  if(busy) return;
  if(code===lastCode && now-lastCodeAt<2500) return;
  lastCode = code; lastCodeAt = now;
  await handleCode(code.trim());
}
async function handleCode(code){
  if(!code || busy) return;
  busy = true; beep(); pauseScan();
  let prod = products.get(code);
  if(!prod){
    $("scanStatus").textContent = t("buscando");
    const off = await lookupOFF(code);
    toast(off ? t("encontradoOFF") : t("noEncontrado"), off ? "ok" : "");
    openRegModal(code, off);
    busy = false; return;
  }
  openMoveModal(code, prod);
  busy = false;
}

function renderCats(){

  const byCat = new Map();
  [...products.entries()].forEach(([id,p])=>{
    if(q && !(p.nombre||"").toLowerCase().includes(q) && !(p.code||"").includes(q)) return;
    const c = CATS.includes(p.categoria) ? p.categoria : "OTROS";
    if(!byCat.has(c)) byCat.set(c,[]);
    byCat.get(c).push([id,p]);
  });
  const el = $("catsList");
  if(!byCat.size){ el.innerHTML = `<div class="empty">${esc(q ? "—" : t("vacioStock"))}</div>`; return; }
  el.innerHTML = CATS.filter(c=>byCat.has(c)).map(c=>{
    const items = byCat.get(c).sort((a,b)=>(a[1].nombre||"").localeCompare(b[1].nombre||""));
    const open = q || openCats.has(c);
    return `<div class="cat${open?" open":""}" data-cat="${esc(c)}">
      <div class="cat-head">
        <h2>${esc(c)}</h2>
        <div class="right"><span>${items.length} prod.</span><span class="chev">▶</span></div>
      </div>
      <div class="cat-body">
        ${items.map(([id,p])=>{
          const low = isLow(p);
          const minLabel = `${t("min")} ${p.min ?? STOCK_MIN_DEFAULT}`;
          return `<div class="prod${low?" low":""}" data-id="${esc(id)}">
            <div class="prod-top">
              <div class="prod-name">${esc(p.nombre)}${low?`<span class="low-badge">${esc(t("pocoStock"))}</span>`:""}</div>
              <div class="qty-ctrl">
                <button class="cbtn minus" data-act="dec">−</button>
                <span class="qv">${p.cantidad}</span>
                <button class="cbtn plus" data-act="inc">＋</button>
              </div>
            </div>
            <div class="prod-sub">
              ${isAdmin()
                ? `<button class="min-btn" data-act="cfg">⚙ ${esc(minLabel)}</button>`
                : `<span class="min-btn plain">${esc(minLabel)}</span>`}
              ${p.code?`<span class="code">${esc(p.code)}</span>`:""}
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("");
  el.querySelectorAll(".cat-head").forEach(h=>h.addEventListener("click",()=>{
    const cat = h.parentElement.dataset.cat;
    if(openCats.has(cat)) openCats.delete(cat); else openCats.add(cat);
    h.parentElement.classList.toggle("open");
  }));
  el.querySelectorAll("[data-act]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const id = b.closest(".prod").dataset.id;
    const act = b.dataset.act;
    if(act==="inc") applyDelta(id, +1);
    else if(act==="dec") applyDelta(id, -1);
    else if(act==="cfg") openMinModal(id);
  }));
}
function renderHistory(){
  const el = $("historyList");
  if(!movements.length){ el.innerHTML = `<div class="empty">${esc(t("vacioHist"))}</div>`; return; }
  el.innerHTML = movements.map(m=>{
    const by = m.byName ? `<span class="by"><span class="av" style="background:${esc(m.byColor||"#999")}">${esc(initial(m.byName))}</span>${esc(m.byName)}</span> · ` : "";
    return `<div class="mv-card">
      <span class="mv-tag ${m.tipo==="entrada"?"in":"out"}">${m.tipo==="entrada"?"+":"−"}${m.cantidad}</span>
      <div class="info">
        <div class="name">${esc(m.nombre)}</div>
        <div class="meta">${by}${esc(fmtTs(m.ts))}</div>
      </div>
    </div>`;
  }).join("");
}
$("stockSearch").addEventListener("input", renderCats);
$("expBtn").addEventListener("click", ()=>{ CATS.forEach(c=>openCats.add(c)); renderCats(); });
$("colBtn").addEventListener("click", ()=>{ openCats.clear(); renderCats(); });

/* =================== Recetario =================== */
let recFormCopa = "highball", recFormColor = GLASS_COLORS[0][1];
function buildRecFormPickers(){
  $("copaOpts").innerHTML = COPAS.map(c=>`
    <button type="button" class="copa-opt${c===recFormCopa?" sel":""}" data-copa="${c}">
      ${glassSVG(c, recFormColor, "")}
      <span>${c}</span>
    </button>`).join("");
  $("swatches").innerHTML = GLASS_COLORS.map(([n,hex])=>`
    <button type="button" class="swatch${hex===recFormColor?" sel":""}" data-color="${hex}" title="${n}" style="background:${hex}"></button>`).join("");
  $("copaOpts").querySelectorAll("[data-copa]").forEach(b=>b.addEventListener("click",()=>{
    recFormCopa = b.dataset.copa; buildRecFormPickers();
  }));
  $("swatches").querySelectorAll("[data-color]").forEach(b=>b.addEventListener("click",()=>{
    recFormColor = b.dataset.color; buildRecFormPickers();
  }));
}
function openRecForm(id){
  if(!isAdmin()){ toast(t("soloAdmin"),"err"); return; }
  recEditId = id;
  const r = id ? recipes.get(id) : null;
  $("recFormTitle").textContent = r ? t("editarCoctel") : t("nuevoCoctel");
  $("recName").value = r ? r.nombre : "";
  recFormCopa = r ? r.copa : "highball";
  recFormColor = r ? r.color : GLASS_COLORS[0][1];
  $("recGarnish").value = r ? (r.garnish||"") : "";
  $("recIng").value = r ? (r.ing||[]).join("\n") : "";
  $("recSteps").value = r ? (r.pasos||[]).join("\n") : "";
  buildRecFormPickers();
  $("recModalBg").classList.add("open");
}
$("recCancel").addEventListener("click", ()=>$("recModalBg").classList.remove("open"));
$("recSave").addEventListener("click", async ()=>{
  const nombre = $("recName").value.trim().toUpperCase();
  if(!nombre){ toast(t("nombreReq"),"err"); return; }
  const rec = {
    nombre, copa:recFormCopa, color:recFormColor,
    garnish: $("recGarnish").value.trim().slice(0,4),
    ing: $("recIng").value.split("\n").map(s=>s.trim()).filter(Boolean),
    pasos: $("recSteps").value.split("\n").map(s=>s.trim()).filter(Boolean)
  };
  const id = recEditId || newId("r");
  recipes.set(id, rec);
  await persist("gf_recetas", id, rec);
  $("recModalBg").classList.remove("open");
  toast(`✓ ${t("prodGuardado")}`,"ok");
  renderRecipes();
});
function renderRecipes(){
  const el = $("recGrid");
  if(!recipes.size){ el.innerHTML = `<div class="empty" style="grid-column:1/-1">${esc(t("vacioRec"))}</div>`; return; }
  const arr = [...recipes.entries()].sort((a,b)=>(a[1].nombre||"").localeCompare(b[1].nombre||""));
  el.innerHTML = arr.map(([id,r])=>`
    <button class="rec-card" data-rec="${esc(id)}">
      ${glassSVG(r.copa, r.color, r.garnish)}
      <h3>${esc(r.nombre)}</h3>
    </button>`).join("");
  el.querySelectorAll("[data-rec]").forEach(c=>c.addEventListener("click",()=>openRecView(c.dataset.rec)));
}
function openRecView(id){
  const r = recipes.get(id); if(!r) return;
  recViewId = id;
  $("recViewName").textContent = r.nombre;
  $("recViewGlass").innerHTML = glassSVG(r.copa, r.color, r.garnish);
  $("recViewIng").innerHTML = (r.ing||[]).map(i=>`<div class="rec-item"><span class="n">•</span><span>${esc(i)}</span></div>`).join("") || `<div class="empty">—</div>`;
  $("recViewSteps").innerHTML = (r.pasos||[]).map((s,i)=>`<div class="rec-item"><span class="n">${i+1}.</span><span>${esc(s)}</span></div>`).join("") || `<div class="empty">—</div>`;
  $("recViewActions").style.display = isAdmin() ? "flex" : "none";
  $("recViewBg").classList.add("open");
}
$("recViewClose").addEventListener("click", ()=>$("recViewBg").classList.remove("open"));
$("recEditBtn").addEventListener("click", ()=>{ $("recViewBg").classList.remove("open"); openRecForm(recViewId); });
$("recDelBtn").addEventListener("click", async ()=>{
  if(!confirm(t("confirmDel"))) return;
  recipes.delete(recViewId);
  await persistDel("gf_recetas", recViewId);
  $("recViewBg").classList.remove("open");
  toast(t("prodBorrado"));
  renderRecipes();
});

/* =================== Manual =================== */
function openManForm(id){
  if(!isAdmin()){ toast(t("soloAdmin"),"err"); return; }
  manEditId = id;
  const m = id ? manual.get(id) : null;
  $("manFormTitle").textContent = m ? m.titulo : t("nuevaSec");
  $("manTitle").value = m ? m.titulo : "";
  $("manItems").value = m ? (m.items||[]).join("\n") : "";
  $("manDelete").style.display = id ? "inline-flex" : "none";
  $("manModalBg").classList.add("open");
}
$("manCancel").addEventListener("click", ()=>$("manModalBg").classList.remove("open"));
$("manSave").addEventListener("click", async ()=>{
  const titulo = $("manTitle").value.trim().toUpperCase();
  if(!titulo){ toast(t("nombreReq"),"err"); return; }
  const items = $("manItems").value.split("\n").map(s=>s.trim()).filter(Boolean);
  const id = manEditId || newId("m");
  const orden = manEditId ? (manual.get(manEditId)?.orden ?? 99) : (manual.size + 1);
  const sec = {titulo, items, orden};
  manual.set(id, sec);
  await persist("gf_manual", id, sec);
  $("manModalBg").classList.remove("open");
  toast(`✓ ${t("prodGuardado")}`,"ok");
  renderManual();
});
$("manDelete").addEventListener("click", async ()=>{
  if(!confirm(t("confirmDel"))) return;
  manual.delete(manEditId);
  await persistDel("gf_manual", manEditId);
  $("manModalBg").classList.remove("open");
  toast(t("prodBorrado"));
  renderManual();
});
function renderManual(){
  const el = $("manList");
  if(!manual.size){ el.innerHTML = `<div class="empty">—</div>`; return; }
  const arr = [...manual.entries()].sort((a,b)=>(a[1].orden??99)-(b[1].orden??99));
  el.innerHTML = arr.map(([id,m])=>{
    const open = openMans.has(id);
    return `<div class="man-sec${open?" open":""}" data-man="${esc(id)}">
      <div class="man-head">
        <h2>${esc(m.titulo)}</h2>
        <div class="right"><span>${(m.items||[]).length} ${esc(t("puntos"))}</span><span class="chev">▶</span></div>
      </div>
      <div class="man-body">
        ${(m.items||[]).map(i=>`<div class="man-item"><span class="dot">›</span><span>${esc(i)}</span></div>`).join("")}
        ${isAdmin()?`<button class="man-edit" data-edit="${esc(id)}">${esc(t("editarSec"))}</button>`:""}
      </div>
    </div>`;
  }).join("");
  el.querySelectorAll(".man-head").forEach(h=>h.addEventListener("click",()=>{
    const id = h.parentElement.dataset.man;
    if(openMans.has(id)) openMans.delete(id); else openMans.add(id);
    h.parentElement.classList.toggle("open");
  }));
  el.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    openManForm(b.dataset.edit);
  }));
}

/* =================== Empleados =================== */
let empFormColor = AVATAR_COLORS[0];
function buildEmpColors(){
  $("empColors").innerHTML = AVATAR_COLORS.map(c=>`<button type="button" class="color-opt${c===empFormColor?" sel":""}" data-c="${c}" style="background:${c}"></button>`).join("");
  $("empColors").querySelectorAll("[data-c]").forEach(b=>b.addEventListener("click",()=>{ empFormColor = b.dataset.c; buildEmpColors(); }));
}
function openEmpForm(id){
  if(!isAdmin()){ toast(t("soloAdmin"),"err"); return; }
  empEditId = id;
  const e = id ? employees.get(id) : null;
  $("empFormTitle").textContent = e ? t("editarEmp") : t("nuevoEmp");
  $("empName").value = e ? e.nombre : "";
  $("empPin").value = e ? e.pin : "";
  empFormColor = e ? (e.color||AVATAR_COLORS[0]) : AVATAR_COLORS[employees.size % AVATAR_COLORS.length];
  $("empDelete").style.display = id ? "inline-flex" : "none";
  buildEmpColors();
  $("empModalBg").classList.add("open");
}
$("empCancel").addEventListener("click", ()=>$("empModalBg").classList.remove("open"));
$("empSave").addEventListener("click", async ()=>{
  const nombre = $("empName").value.trim().toUpperCase();
  const pin = $("empPin").value.trim();
  if(!nombre){ toast(t("nombreReq"),"err"); return; }
  if(!/^\d{4,6}$/.test(pin)){ toast(t("pinReq"),"err"); return; }
  // PIN único (admin + otros empleados)
  if(pin===ADMIN_PIN){ toast(t("pinDup"),"err"); return; }
  for(const [eid,e] of employees){ if(eid!==empEditId && e.pin===pin){ toast(t("pinDup"),"err"); return; } }
  const id = empEditId || newId("e");
  const orden = empEditId ? (employees.get(empEditId)?.orden ?? 99) : (employees.size + 1);
  const emp = {nombre, pin, color:empFormColor, orden};
  employees.set(id, emp);
  await persist("gf_empleados", id, emp);
  $("empModalBg").classList.remove("open");
  toast(`✓ ${t("prodGuardado")}`,"ok");
  renderEmployees(); renderLogin();
});
$("empDelete").addEventListener("click", async ()=>{
  if(!confirm(t("confirmDel"))) return;
  employees.delete(empEditId);
  await persistDel("gf_empleados", empEditId);
  $("empModalBg").classList.remove("open");
  toast(t("prodBorrado"));
  renderEmployees(); renderLogin();
});
function renderEmployees(){
  const el = $("empList");
  let html = `<div class="emp-row admin">
    <div class="avatar" style="width:44px;height:44px;font-size:18px;background:${ADMIN_USER.color}">${esc(initial(ADMIN_USER.nombre))}</div>
    <div class="info"><div class="en">${esc(ADMIN_USER.nombre)}</div><div class="er">${esc(t("admin"))} · PIN ${esc(ADMIN_PIN)}</div></div>
  </div>`;
  const arr = [...employees.entries()].sort((a,b)=>(a[1].orden??99)-(b[1].orden??99));
  html += arr.map(([id,e])=>`
    <div class="emp-row">
      <div class="avatar" style="width:44px;height:44px;font-size:18px;background:${esc(e.color||"#E5392B")}">${esc(initial(e.nombre))}</div>
      <div class="info"><div class="en">${esc(e.nombre)}</div><div class="er">${esc(t("empleado"))} · PIN ${esc(e.pin)}</div></div>
      <div class="emp-actions">
        <button data-edit="${esc(id)}">✎</button>
      </div>
    </div>`).join("");
  el.innerHTML = html;
  el.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>openEmpForm(b.dataset.edit)));
}

/* =================== Render all / init =================== */
function renderAll(){
  renderStats(); renderShopping(); renderCats(); renderHistory(); renderRecipes(); renderManual(); renderEmployees();
  const chip = $("userChip");
  if(currentUser){
    $("userAv").style.background = currentUser.color;
    $("userAv").textContent = initial(currentUser.nombre);
    $("userName").textContent = currentUser.nombre;
    chip.classList.toggle("admin", isAdmin());
  }
  $("teamTile").style.display = isAdmin() ? "flex" : "none";
  const fabScreens = isAdmin() ? {stock:1, recipes:1, manual:1, team:1} : {stock:1};
  $("fab").style.display = fabScreens[currentScreen] ? "flex" : "none";
}
applyI18n();
initData();
</script>
</body>
